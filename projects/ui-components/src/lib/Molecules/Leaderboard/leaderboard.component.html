<div class="noticeboard">
  <div class="noticeboard-header">
    <span class="pin"></span>
    <h2 class="noticeboard-title">Leaderboard</h2>
  </div>
  <div class="leaderboard-table" role="table" aria-label="Race leaderboard">
    <div class="leaderboard-head" role="row">
      <div class="col-pos" role="columnheader">Pos</div>
      <div class="col-name" role="columnheader">Horse</div>
    </div>
    @for (entry of raceStore.leaderboard(); track entry.number) {
      <div class="leaderboard-row" role="row">
        <div class="col-pos" role="cell">
          <span class="position-badge">{{ entry.position }}</span>
        </div>
        <div class="col-name" role="cell">
          <span class="horse-name">{{ entry.name }}</span>
          <span class="horse-number">(#{{ entry.number }})</span>
        </div>
      </div>
    }
  </div>
</div>
